{% extends 'core/base.html' %}
{% load static %}

{% block content %}
<div class="container-fluid py-4" style="background:#f0f4f8; min-height:100vh;">

  <div class="row mb-4">
    <div class="col">
      <h1 class="h3 mb-0" style="color:#2c3e50;"><i class="fas fa-plus-circle"></i> Create Assignment</h1>
      <p class="text-muted mt-1">Add a new assignment for one of your courses</p>
    </div>
    <div class="col-auto">
      <a href="{% url 'assignments:instructor_dashboard' %}" class="btn btn-outline-secondary btn-sm" style="border-radius:8px;">
        <i class="fas fa-arrow-left"></i> Back to Dashboard
      </a>
    </div>
  </div>

  <div class="row justify-content-center">
    <div class="col-lg-7">
      <div class="card shadow-sm border-0" style="border-radius:14px;">
        <div class="card-body p-4">
          <form method="post" novalidate>
            {% csrf_token %}

            <!-- Course -->
            <div class="mb-3">
              <label class="form-label fw-semibold">Course <span class="text-danger">*</span></label>
              <select name="course" class="form-select" required style="border-radius:8px;">
                <option value="">— Select a course —</option>
                {% for course in instructor_courses %}
                  <option value="{{ course.id }}">{{ course.title }}</option>
                {% endfor %}
              </select>
            </div>

            <!-- Title -->
            <div class="mb-3">
              <label class="form-label fw-semibold">Assignment Title <span class="text-danger">*</span></label>
              <input type="text" name="title" class="form-control" placeholder="e.g. Week 3 Research Paper"
                     required style="border-radius:8px;">
            </div>

            <!-- Description -->
            <div class="mb-3">
              <label class="form-label fw-semibold">Description / Instructions</label>
              <textarea name="description" class="form-control" rows="4"
                        placeholder="Describe what students need to submit…"
                        style="border-radius:8px;"></textarea>
            </div>

            <!-- Due date -->
            <div class="mb-4">
              <label class="form-label fw-semibold">Due Date <span class="text-muted fw-normal">(optional)</span></label>
              <input type="datetime-local" name="due_date" class="form-control" style="border-radius:8px;">
            </div>

            <button type="submit" class="btn w-100"
                    style="background:linear-gradient(135deg,#1a5276,#2980b9);color:#fff;border-radius:8px;font-weight:600;">
              <i class="fas fa-check me-1"></i> Create Assignment
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>

</div>
{% endblock %}
